<!doctype html>
<html lang="sl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTV Shadap</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header class="topbar">
        <h1>RTV Shadap</h1>
        <button id="enabled-switch" class="switch" type="button" role="switch" aria-checked="true" title="Enable or disable marking">
          <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
          <span id="enabled-label" class="switch-label">Enabled</span>
        </button>
      </header>
      <button id="mark-page" type="button">Do the magic</button>
      <button id="reset" type="button">Reset</button>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
