<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RTV Shadap settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <p class="eyebrow">RTV Shadap</p>
      <h1>Device sync</h1>
      <p class="intro">Choose whether marked article IDs stay on this device or use your browser's built-in sync.</p>
      <form id="sync-form">
        <label class="choice">
          <input type="radio" name="sync-mode" value="browser">
          <span><strong>Sync across devices</strong><small>No RTV Shadap account or sign-in. Your browser transports a compact list of marked article IDs.</small></span>
        </label>
        <label class="choice">
          <input type="radio" name="sync-mode" value="local">
          <span><strong>Keep this device local</strong><small>History never enters browser sync and remains available only in this browser profile.</small></span>
        </label>
        <p class="note">Changing this device to local-only does not erase history already shared with your other devices.</p>
        <button type="submit">Save</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
