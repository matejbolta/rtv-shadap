name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Package extension
        run: node scripts/package.mjs

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" release/rtv-shadap-*.zip --clobber
          else
            gh release create "$TAG_NAME" release/rtv-shadap-*.zip \
              --title "RTV Shadap $TAG_NAME" \
              --notes "Use rtv-shadap-$TAG_NAME.zip for manual unpacked installation. Use rtv-shadap-$TAG_NAME-webstore.zip for Chrome Web Store upload."
          fi
